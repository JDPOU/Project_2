{% extends "base.html" %}
{% block content %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h2 class="mb-3">Live Packet Capture</h2>

<div id="statusIndicator" class="alert alert-secondary">Status: Updating...</div>

<div class="row mb-4">
    <div class="col-md-4">
        <canvas id="trafficChart" width="400" height="200"></canvas>
    </div>
    <div class="col-md-8 d-flex align-items-center">
        <a class="btn btn-success me-2" href="{{ url_for('start_capture') }}">Start</a>
        <a class="btn btn-danger me-2" href="{{ url_for('stop_capture') }}">Stop</a>
        <button class="btn btn-secondary" onclick="filterPackets('ALL')">All</button>
        <button class="btn btn-outline-secondary ms-2" onclick="filterPackets('DNS')">DNS Only</button>
    </div>
</div>

<table class="table table-striped table-bordered" id="packetTable">
    <thead class="table-dark">
        <tr>
            <th>Source</th>
            <th>Destination</th>
            <th>Protocol</th>
            <th>Summary</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<div class="modal fade" id="packetModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Packet Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <pre id="modalDetails"></pre>
            </div>
        </div>
    </div>
</div>

<script>
    let chart;
    let currentPackets = [];

    // 1. Filter Logic
    function filterPackets(filterType) {
        fetch('/set_filter/' + filterType)
            .then(() => {
                updateDashboard();
            });
    }

    // 2. Dashboard Logic
    function updateDashboard() {
        // Fetch Packets
        fetch('/packets')
            .then(res => res.json())
            .then(data => {
                currentPackets = data; // Store globally for Modal usage
                const tbody = document.querySelector('#packetTable tbody');
                tbody.innerHTML = '';
                
                data.forEach((p, index) => {
                    const row = `<tr>
                        <td>${p.src}</td>
                        <td>${p.dst}</td>
                        <td>${p.proto}</td>
                        <td>${p.summary} ${p.domain ? ' | 🌐 ' + p.domain : ''}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="showDetails(${index})">View</button>
                        </td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
                
                // Update Status
                const statusDiv = document.getElementById('statusIndicator');
                statusDiv.className = data.length > 0 ? "alert alert-success" : "alert alert-danger";
                statusDiv.innerHTML = data.length > 0 ? "Status: <strong>Capturing Packets</strong>" : "Status: <strong>Not Capturing</strong>";
            });

        // Fetch Stats
        // Replace the entire fetch('/stats') block in index.html with this:

fetch('/stats')
    .then(res => res.json())
    .then(stats => {
        // 1. Update Chart
        chart.data.datasets[0].data = [stats.TCP, stats.UDP, stats.ICMP, stats.Other];
        chart.update();
        
        // 2. Update Status Text correctly based on backend state
        const statusDiv = document.getElementById('statusIndicator');
        if (stats.capturing) {
            statusDiv.className = "alert alert-success";
            statusDiv.innerHTML = "Status: <strong>Capturing Packets</strong>";
        } else {
            statusDiv.className = "alert alert-danger";
            statusDiv.innerHTML = "Status: <strong>Not Capturing</strong>";
        }
    });
    }

    // 3. Modal helper
    function showDetails(index) {
        const pkt = currentPackets[index];
        document.getElementById('modalDetails').textContent = pkt.details;
        const myModal = new bootstrap.Modal(document.getElementById('packetModal'));
        myModal.show();
    }

    // Auto-refresh
    setInterval(updateDashboard, 3000);

    // Initialization
    window.onload = () => {
        const ctx = document.getElementById('trafficChart');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['TCP', 'UDP', 'ICMP', 'Other'],
                datasets: [{ 
                    data: [0, 0, 0, 0], 
                    backgroundColor: ['#0d6efd', '#ffc107', '#0dcaf0', '#6c757d'] 
                }]
            }
        });
        updateDashboard();
    };
</script>
{% endblock %}
